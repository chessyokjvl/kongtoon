<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | รพ.จิตเวชเลยราชนครินทร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-800 text-white flex flex-col hidden md:flex transition-all">
        <div class="p-5 text-center border-b border-slate-700">
            <h1 class="text-xl font-bold text-blue-400">ระบบการเงิน</h1>
            <p class="text-xs text-slate-400 mt-1" id="userDisplay">กำลังโหลด...</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchModule('Fund')" id="nav-Fund" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition bg-blue-600"><i class="fa-solid fa-vault w-6"></i> กองทุนผู้ป่วยฯ (หลัก)</button>
            <button onclick="switchModule('Cafe')" id="nav-Cafe" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition"><i class="fa-solid fa-mug-hot w-6"></i> ร้านกาแฟสุขใจ</button>
            <button onclick="switchModule('Shop')" id="nav-Shop" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition"><i class="fa-solid fa-store w-6"></i> ร้านผลิตภัณฑ์ผู้ป่วย</button>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-slate-700 rounded-lg transition"><i class="fa-solid fa-sign-out-alt w-6"></i> ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center md:hidden">
            <h1 class="font-bold text-lg text-slate-800" id="mobileTitle">กองทุนผู้ป่วยฯ</h1>
            <button onclick="logout()" class="text-red-500"><i class="fa-solid fa-sign-out-alt"></i></button>
        </header>

        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800" id="moduleTitle">บัญชีกองทุนเพื่อผู้ป่วยจิตเวชยากไร้</h2>
                <button id="btnAdd" onclick="openModal()" class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-700"><i class="fa-solid fa-plus mr-2"></i>บันทึกรายการ</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-sm text-slate-500">รายรับรวม</p>
                    <h3 class="text-2xl font-bold text-green-600" id="c_income">฿0.00</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-sm text-slate-500">รายจ่ายรวม</p>
                    <h3 class="text-2xl font-bold text-red-600" id="c_expense">฿0.00</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-sm text-slate-500">กำไรสุทธิ</p>
                    <h3 class="text-2xl font-bold text-blue-600" id="c_profit">฿0.00</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-500">
                    <p class="text-sm text-slate-500">เงินสดคงเหลือ</p>
                    <h3 class="text-2xl font-bold text-amber-600" id="c_cash">฿0.00</h3>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600">
                        <thead class="bg-slate-50 text-slate-800 border-b">
                            <tr>
                                <th class="p-4">วันที่</th><th class="p-4">ประเภท</th><th class="p-4">รายการ</th>
                                <th class="p-4">จำนวนเงิน</th><th class="p-4">หลักฐาน</th><th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y">
                            <tr><td colspan="6" class="p-4 text-center">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="txModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800" id="modalTitle">บันทึกรายการใหม่</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <form id="txForm" onsubmit="submitForm(event)">
                <input type="hidden" id="f_id">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="block text-sm mb-1">วันที่</label><input type="date" id="f_date" required class="w-full border rounded-lg p-2"></div>
                    <div><label class="block text-sm mb-1">ประเภท</label><select id="f_type" required class="w-full border rounded-lg p-2"><option value="รายรับ">รายรับ</option><option value="รายจ่าย">รายจ่าย</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="block text-sm mb-1">รายการ</label><input type="text" id="f_item" placeholder="เช่น ขายสินค้า, ซื้อของ" required class="w-full border rounded-lg p-2"></div>
                    <div><label class="block text-sm mb-1">ช่องทาง</label><select id="f_method" class="w-full border rounded-lg p-2"><option value="เงินสด">เงินสด</option><option value="เงินโอน">เงินโอน</option><option value="-">-</option></select></div>
                </div>
                <div class="mb-4"><label class="block text-sm mb-1">จำนวนเงิน</label><input type="number" step="0.01" id="f_amount" required class="w-full border rounded-lg p-2"></div>
                <div class="mb-4"><label class="block text-sm mb-1">หมายเหตุ</label><input type="text" id="f_note" class="w-full border rounded-lg p-2"></div>
                
                <div class="mb-6 p-3 bg-slate-50 border rounded-lg">
                    <label class="block text-sm font-semibold mb-2">หลักฐาน (รูปภาพ/PDF หรือ ลิงก์)</label>
                    <select id="f_eviType" onchange="toggleEvi()" class="w-full border rounded-lg p-2 mb-2"><option value="file">อัปโหลดไฟล์ (ไม่เกิน 5MB)</option><option value="link">วางลิงก์เอกสาร</option></select>
                    <input type="file" id="f_file" accept="image/*,.pdf" class="w-full text-sm">
                    <input type="url" id="f_link" placeholder="https://..." class="w-full border rounded-lg p-2 hidden">
                </div>

                <button type="submit" id="btnSave" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbza4EAFjZbKSpvUx_xoL9YRSnLWetFVBMEsIJVdpR_sgJtNhotvOiOms7T5YZAlDzGpgA/exec'; // ใส่ URL จาก Google Apps Script
        
        let currentUser = JSON.parse(sessionStorage.getItem('user'));
        if (!currentUser) window.location.href = 'index.html'; // Auth Guard
        document.getElementById('userDisplay').innerText = `ผู้ใช้งาน: ${currentUser.username} (${currentUser.role})`;

        let currentModule = 'Fund';
        let rawData = [];

        // --- Core Logic ---
        function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('aside nav button').forEach(b => { b.classList.remove('bg-blue-600'); b.classList.add('hover:bg-slate-700'); });
            document.getElementById(`nav-${mod}`).classList.add('bg-blue-600');
            document.getElementById(`nav-${mod}`).classList.remove('hover:bg-slate-700');
            
            const titles = { Fund: 'บัญชีกองทุนเพื่อผู้ป่วยจิตเวชยากไร้', Cafe: 'ร้านกาแฟสุขใจ', Shop: 'ร้านผลิตภัณฑ์ผู้ป่วย' };
            document.getElementById('moduleTitle').innerText = titles[mod];
            document.getElementById('mobileTitle').innerText = titles[mod];

            checkPermissions();
            fetchData();
        }

        function checkPermissions() {
            const btn = document.getElementById('btnAdd');
            // Check Role-Based Access Control
            if (currentUser.role === 'God_Admin' || currentUser.role === `Admin_${currentModule}`) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        async function fetchData() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="p-4 text-center"><i class="fa-solid fa-spinner fa-spin text-blue-500 text-2xl"></i> กำลังโหลด...</td></tr>';
            try {
                const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_data', payload: { module: currentModule } }) })).json();
                if (res.status === 'success') { rawData = res.data; renderData(); }
            } catch (err) { Swal.fire('Error', 'โหลดข้อมูลล้มเหลว', 'error'); }
        }

        function renderData() {
            const tb = document.getElementById('tableBody'); tb.innerHTML = '';
            let inc = 0, exp = 0;
            
            if (rawData.length === 0) return tb.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-500">ไม่มีข้อมูลในระบบ</td></tr>';

            rawData.forEach(r => {
                if(r.type === 'รายรับ') inc += Number(r.amount); else exp += Number(r.amount);
                
                let eviHtml = r.evidence ? `<a href="${r.evidence}" target="_blank" class="text-blue-500 hover:underline"><i class="fa-solid fa-paperclip"></i> ดูหลักฐาน</a>` : '-';
                
                // สิทธิ์ลบ/แก้ เฉพาะ Admin ที่มีสิทธิ์
                let actionHtml = '-';
                if (currentUser.role === 'God_Admin' || currentUser.role === `Admin_${currentModule}`) {
                    actionHtml = `
                        <button onclick='editTx(${JSON.stringify(r)})' class="text-amber-500 hover:text-amber-700 mx-1"><i class="fa-solid fa-edit"></i></button>
                        <button onclick="deleteTx('${r.id}')" class="text-red-500 hover:text-red-700 mx-1"><i class="fa-solid fa-trash"></i></button>
                    `;
                }

                tb.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4">${r.date}</td>
                        <td class="p-4"><span class="px-2 py-1 text-xs rounded-full ${r.type==='รายรับ'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${r.type}</span></td>
                        <td class="p-4">${r.item} <br><span class="text-xs text-slate-400">${r.note||''}</span></td>
                        <td class="p-4 font-medium">฿${Number(r.amount).toLocaleString('th-TH')}</td>
                        <td class="p-4 text-sm">${eviHtml}</td>
                        <td class="p-4 text-center">${actionHtml}</td>
                    </tr>`;
            });

            document.getElementById('c_income').innerText = `฿${inc.toLocaleString('th-TH')}`;
            document.getElementById('c_expense').innerText = `฿${exp.toLocaleString('th-TH')}`;
            document.getElementById('c_profit').innerText = `฿${(inc - exp).toLocaleString('th-TH')}`;
            document.getElementById('c_cash').innerText = `฿${(inc - exp).toLocaleString('th-TH')}`; // (จำลอง) ในของจริงอาจต้องหักยอดโอน
        }

        // --- Form & Upload ---
        function toggleEvi() {
            if(document.getElementById('f_eviType').value === 'file') {
                document.getElementById('f_file').classList.remove('hidden'); document.getElementById('f_link').classList.add('hidden');
            } else {
                document.getElementById('f_file').classList.add('hidden'); document.getElementById('f_link').classList.remove('hidden');
            }
        }

        function getBase64(file) {
            return new Promise((res, rej) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => res(reader.result.replace(/^data:(.*,)?/, ''));
                reader.onerror = e => rej(e);
            });
        }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave'); btn.innerText = 'กำลังบันทึก...'; btn.disabled = true;

            let payload = {
                module: currentModule, username: currentUser.username, rowIndex: document.getElementById('f_id').value,
                date: document.getElementById('f_date').value, type: document.getElementById('f_type').value,
                item: document.getElementById('f_item').value, method: document.getElementById('f_method').value,
                amount: document.getElementById('f_amount').value, note: document.getElementById('f_note').value
            };

            if(document.getElementById('f_eviType').value === 'file') {
                const f = document.getElementById('f_file').files[0];
                if(f) {
                    if(f.size > 5242880) { Swal.fire('ผิดพลาด', 'ไฟล์ขนาดเกิน 5MB', 'warning'); btn.innerText = 'บันทึกข้อมูล'; btn.disabled = false; return; }
                    payload.fileBase64 = await getBase64(f); payload.fileName = f.name; payload.fileMimeType = f.type;
                }
            } else payload.evidenceLink = document.getElementById('f_link').value;

            try {
                const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'save_tx', payload }) })).json();
                if (res.status === 'success') { Swal.fire('สำเร็จ', res.message, 'success'); closeModal(); fetchData(); }
                else Swal.fire('ผิดพลาด', res.message, 'error');
            } catch (err) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อได้', 'error'); }
            finally { btn.innerText = 'บันทึกข้อมูล'; btn.disabled = false; }
        }

        function editTx(r) {
            document.getElementById('modalTitle').innerText = 'แก้ไขรายการ';
            document.getElementById('f_id').value = r.id; document.getElementById('f_date').value = r.date;
            document.getElementById('f_type').value = r.type; document.getElementById('f_item').value = r.item;
            document.getElementById('f_method').value = r.method; document.getElementById('f_amount').value = r.amount;
            document.getElementById('f_note').value = r.note; openModal();
        }

        function deleteTx(id) {
            Swal.fire({ title: 'ยืนยันการลบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ใช่, ลบเลย' })
            .then(async (result) => {
                if (result.isConfirmed) {
                    const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete_tx', payload: { module: currentModule, rowIndex: id } }) })).json();
                    if(res.status === 'success') fetchData(); else Swal.fire('ผิดพลาด', res.message, 'error');
                }
            });
        }

        function openModal() { document.getElementById('txModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('txModal').classList.add('hidden'); document.getElementById('txForm').reset(); document.getElementById('f_id').value = ''; document.getElementById('modalTitle').innerText = 'บันทึกรายการใหม่'; }
        function logout() { sessionStorage.removeItem('user'); window.location.href = 'index.html'; }

        // Start App
        switchModule('Fund');
    </script>
</body>
</html>
