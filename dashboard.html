<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | รพ.จิตเวชเลยราชนครินทร์</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex h-screen overflow-hidden">

    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-800 text-white flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
        <div class="p-5 text-center border-b border-slate-700 flex justify-between items-center md:block">
            <div class="w-full text-center">
                <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" 
                     alt="โลโก้ รพ." 
                     class="w-16 h-auto mx-auto mb-3 bg-white/90 p-1 rounded-full shadow-lg">
                     
                <h1 class="text-xl font-bold text-blue-400">ระบบการเงิน</h1>
                <p class="text-xs text-slate-400 mt-1" id="userDisplay">กำลังโหลด...</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white focus:outline-none">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="switchModule('Fund')" id="nav-Fund" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition bg-blue-600"><i class="fa-solid fa-vault w-6"></i> กองทุนผู้ป่วยฯ (หลัก)</button>
            <button onclick="switchModule('Cafe')" id="nav-Cafe" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition"><i class="fa-solid fa-mug-hot w-6"></i> ร้านกาแฟสุขใจ</button>
            <button onclick="switchModule('Shop')" id="nav-Shop" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition"><i class="fa-solid fa-store w-6"></i> ร้านผลิตภัณฑ์ผู้ป่วย</button>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-slate-700 rounded-lg transition"><i class="fa-solid fa-sign-out-alt w-6"></i> ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full">
        
        <header class="bg-white shadow-sm p-4 flex justify-between items-center md:hidden z-20">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-slate-600 text-2xl hover:text-blue-600 focus:outline-none"><i class="fa-solid fa-bars"></i></button>
                <h1 class="font-bold text-lg text-slate-800 truncate w-48" id="mobileTitle">กองทุนผู้ป่วยฯ</h1>
            </div>
            <button onclick="logout()" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-sign-out-alt text-xl"></i></button>
        </header>

        <div class="p-4 md:p-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 hidden md:block" id="moduleTitle">บัญชีกองทุนเพื่อผู้ป่วยจิตเวชยากไร้</h2>
                <button id="btnAdd" onclick="openModal()" class="hidden w-full md:w-auto bg-blue-600 text-white px-4 py-2.5 rounded-lg shadow hover:bg-blue-700 transition"><i class="fa-solid fa-plus mr-2"></i>บันทึกรายการ</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-xs md:text-sm text-slate-500">รายรับรวม</p>
                    <h3 class="text-lg md:text-2xl font-bold text-green-600 truncate" id="c_income">฿0.00</h3>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-xs md:text-sm text-slate-500">รายจ่ายรวม</p>
                    <h3 class="text-lg md:text-2xl font-bold text-red-600 truncate" id="c_expense">฿0.00</h3>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-xs md:text-sm text-slate-500">กำไรสุทธิ</p>
                    <h3 class="text-lg md:text-2xl font-bold text-blue-600 truncate" id="c_profit">฿0.00</h3>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-amber-500">
                    <p class="text-xs md:text-sm text-slate-500">เงินสดคงเหลือ</p>
                    <h3 class="text-lg md:text-2xl font-bold text-amber-600 truncate" id="c_cash">฿0.00</h3>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600 min-w-[600px]">
                        <thead class="bg-slate-50 text-slate-800 border-b">
                            <tr>
                                <th class="p-3 md:p-4 font-semibold">วันที่</th>
                                <th class="p-3 md:p-4 font-semibold">ประเภท</th>
                                <th class="p-3 md:p-4 font-semibold">รายการ</th>
                                <th class="p-3 md:p-4 font-semibold text-right">จำนวนเงิน</th>
                                <th class="p-3 md:p-4 font-semibold text-center">หลักฐาน</th>
                                <th class="p-3 md:p-4 font-semibold text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <tr><td colspan="6" class="p-4 text-center">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="txModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50 p-4 transition-opacity">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl p-5 md:p-6 overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-3">
                <h3 class="text-lg md:text-xl font-bold text-slate-800" id="modalTitle">บันทึกรายการใหม่</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 focus:outline-none"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <form id="txForm" onsubmit="submitForm(event)">
                <input type="hidden" id="f_id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-3">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">วันที่</label><input type="date" id="f_date" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">ประเภท</label><select id="f_type" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"><option value="รายรับ">รายรับ</option><option value="รายจ่าย">รายจ่าย</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-3">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">รายการ</label><input type="text" id="f_item" placeholder="เช่น ขายสินค้า, ซื้อของ" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">ช่องทาง</label><select id="f_method" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"><option value="เงินสด">เงินสด</option><option value="เงินโอน">เงินโอน</option><option value="-">-</option></select></div>
                </div>
                <div class="mb-3"><label class="block text-sm font-medium text-slate-700 mb-1">จำนวนเงิน</label><input type="number" step="0.01" id="f_amount" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div class="mb-3"><label class="block text-sm font-medium text-slate-700 mb-1">หมายเหตุ</label><input type="text" id="f_note" placeholder="รายละเอียดเพิ่มเติม" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                
                <div class="mb-5 p-3 md:p-4 bg-slate-50 border border-slate-200 rounded-lg">
                    <label class="block text-sm font-semibold text-slate-800 mb-2">หลักฐาน <span class="text-xs font-normal text-slate-500">(ไม่บังคับ)</span></label>
                    <select id="f_eviType" onchange="toggleEvi()" class="w-full border border-slate-300 rounded-lg p-2 mb-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none"><option value="file">อัปโหลดไฟล์ (ไม่เกิน 5MB)</option><option value="link">วางลิงก์เอกสาร (Google Drive)</option></select>
                    <input type="file" id="f_file" accept="image/*,.pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200">
                    <input type="url" id="f_link" placeholder="https://..." class="w-full border border-slate-300 rounded-lg p-2 text-sm hidden focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <button type="submit" id="btnSave" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
