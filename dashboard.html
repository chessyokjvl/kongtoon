<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | รพ.จิตเวชเลยราชนครินทร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-800 text-white flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
        <div class="p-5 text-center border-b border-slate-700 flex justify-between items-center md:block">
            <div class="w-full text-center">
                <h1 class="text-xl font-bold text-blue-400">ระบบการเงิน</h1>
                <p class="text-xs text-slate-400 mt-1" id="userDisplay">กำลังโหลด...</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="switchModule('Fund')" id="nav-Fund" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition bg-blue-600"><i class="fa-solid fa-vault w-6"></i> กองทุนผู้ป่วยฯ (หลัก)</button>
            <button onclick="switchModule('Cafe')" id="nav-Cafe" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition"><i class="fa-solid fa-mug-hot w-6"></i> ร้านกาแฟสุขใจ</button>
            <button onclick="switchModule('Shop')" id="nav-Shop" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-700 transition"><i class="fa-solid fa-store w-6"></i> ร้านผลิตภัณฑ์ผู้ป่วย</button>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-slate-700 rounded-lg transition"><i class="fa-solid fa-sign-out-alt w-6"></i> ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full">
        
        <header class="bg-white shadow-sm p-4 flex justify-between items-center md:hidden z-20">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-slate-600 text-2xl hover:text-blue-600 focus:outline-none"><i class="fa-solid fa-bars"></i></button>
                <h1 class="font-bold text-lg text-slate-800 truncate w-48" id="mobileTitle">กองทุนผู้ป่วยฯ</h1>
            </div>
            <button onclick="logout()" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-sign-out-alt text-xl"></i></button>
        </header>

        <div class="p-4 md:p-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 hidden md:block" id="moduleTitle">บัญชีกองทุนเพื่อผู้ป่วยจิตเวชยากไร้</h2>
                <button id="btnAdd" onclick="openModal()" class="hidden w-full md:w-auto bg-blue-600 text-white px-4 py-2.5 rounded-lg shadow hover:bg-blue-700 transition"><i class="fa-solid fa-plus mr-2"></i>บันทึกรายการ</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-xs md:text-sm text-slate-500">รายรับรวม</p>
                    <h3 class="text-lg md:text-2xl font-bold text-green-600 truncate" id="c_income">฿0.00</h3>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-xs md:text-sm text-slate-500">รายจ่ายรวม</p>
                    <h3 class="text-lg md:text-2xl font-bold text-red-600 truncate" id="c_expense">฿0.00</h3>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-xs md:text-sm text-slate-500">กำไรสุทธิ</p>
                    <h3 class="text-lg md:text-2xl font-bold text-blue-600 truncate" id="c_profit">฿0.00</h3>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 border-amber-500">
                    <p class="text-xs md:text-sm text-slate-500">เงินสดคงเหลือ</p>
                    <h3 class="text-lg md:text-2xl font-bold text-amber-600 truncate" id="c_cash">฿0.00</h3>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600 min-w-[600px]">
                        <thead class="bg-slate-50 text-slate-800 border-b">
                            <tr>
                                <th class="p-3 md:p-4 font-semibold">วันที่</th>
                                <th class="p-3 md:p-4 font-semibold">ประเภท</th>
                                <th class="p-3 md:p-4 font-semibold">รายการ</th>
                                <th class="p-3 md:p-4 font-semibold text-right">จำนวนเงิน</th>
                                <th class="p-3 md:p-4 font-semibold text-center">หลักฐาน</th>
                                <th class="p-3 md:p-4 font-semibold text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <tr><td colspan="6" class="p-4 text-center">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="txModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50 p-4 transition-opacity">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl p-5 md:p-6 overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-3">
                <h3 class="text-lg md:text-xl font-bold text-slate-800" id="modalTitle">บันทึกรายการใหม่</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 focus:outline-none"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <form id="txForm" onsubmit="submitForm(event)">
                <input type="hidden" id="f_id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-3">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">วันที่</label><input type="date" id="f_date" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">ประเภท</label><select id="f_type" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"><option value="รายรับ">รายรับ</option><option value="รายจ่าย">รายจ่าย</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-3">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">รายการ</label><input type="text" id="f_item" placeholder="เช่น ขายสินค้า, ซื้อของ" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">ช่องทาง</label><select id="f_method" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"><option value="เงินสด">เงินสด</option><option value="เงินโอน">เงินโอน</option><option value="-">-</option></select></div>
                </div>
                <div class="mb-3"><label class="block text-sm font-medium text-slate-700 mb-1">จำนวนเงิน</label><input type="number" step="0.01" id="f_amount" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div class="mb-3"><label class="block text-sm font-medium text-slate-700 mb-1">หมายเหตุ</label><input type="text" id="f_note" placeholder="รายละเอียดเพิ่มเติม" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                
                <div class="mb-5 p-3 md:p-4 bg-slate-50 border border-slate-200 rounded-lg">
                    <label class="block text-sm font-semibold text-slate-800 mb-2">หลักฐาน <span class="text-xs font-normal text-slate-500">(ไม่บังคับ)</span></label>
                    <select id="f_eviType" onchange="toggleEvi()" class="w-full border border-slate-300 rounded-lg p-2 mb-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none"><option value="file">อัปโหลดไฟล์ (ไม่เกิน 5MB)</option><option value="link">วางลิงก์เอกสาร (Google Drive)</option></select>
                    <input type="file" id="f_file" accept="image/*,.pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200">
                    <input type="url" id="f_link" placeholder="https://..." class="w-full border border-slate-300 rounded-lg p-2 text-sm hidden focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <button type="submit" id="btnSave" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbza4EAFjZbKSpvUx_xoL9YRSnLWetFVBMEsIJVdpR_sgJtNhotvOiOms7T5YZAlDzGpgA/exec'; // *** อย่าลืมใส่ URL ของคุณ ***
        
        let currentUser = JSON.parse(sessionStorage.getItem('user'));
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('userDisplay').innerText = `ผู้ใช้งาน: ${currentUser.username} (${currentUser.role})`;

        let currentModule = 'Fund';
        let rawData = [];

        // --- Sidebar Mobile Toggle ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- Core Logic ---
        function switchModule(mod) {
            currentModule = mod;
            
            // เปลี่ยนสีปุ่มเมนู
            document.querySelectorAll('aside nav button').forEach(b => { b.classList.remove('bg-blue-600'); b.classList.add('hover:bg-slate-700'); });
            document.getElementById(`nav-${mod}`).classList.add('bg-blue-600');
            document.getElementById(`nav-${mod}`).classList.remove('hover:bg-slate-700');
            
            // เปลี่ยน Header Text
            const titles = { Fund: 'บัญชีกองทุนเพื่อผู้ป่วยจิตเวชยากไร้', Cafe: 'ร้านกาแฟสุขใจ', Shop: 'ร้านผลิตภัณฑ์ผู้ป่วย' };
            document.getElementById('moduleTitle').innerText = titles[mod];
            document.getElementById('mobileTitle').innerText = titles[mod];

            // ซ่อน Sidebar อัตโนมัติเมื่อกดเลือกเมนูบนมือถือ
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobileOverlay').classList.add('hidden');
            }

            checkPermissions();
            fetchData();
        }

        function checkPermissions() {
            const btn = document.getElementById('btnAdd');
            if (currentUser.role === 'God_Admin' || currentUser.role === `Admin_${currentModule}`) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        async function fetchData() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="p-4 text-center py-10"><i class="fa-solid fa-spinner fa-spin text-blue-500 text-3xl mb-2"></i><br>กำลังโหลด...</td></tr>';
            try {
                const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_data', payload: { module: currentModule } }) })).json();
                if (res.status === 'success') { rawData = res.data; renderData(); }
            } catch (err) { Swal.fire('Error', 'โหลดข้อมูลล้มเหลว', 'error'); }
        }

        function renderData() {
            const tb = document.getElementById('tableBody'); tb.innerHTML = '';
            let inc = 0, exp = 0;
            
            if (rawData.length === 0) return tb.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-500 bg-slate-50">ไม่มีข้อมูลในระบบ</td></tr>';

            rawData.forEach(r => {
                if(r.type === 'รายรับ') inc += Number(r.amount); else exp += Number(r.amount);
                
                let eviHtml = r.evidence ? `<a href="${r.evidence}" target="_blank" class="inline-flex items-center gap-1 px-3 py-1 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 text-xs font-medium"><i class="fa-solid fa-file-pdf"></i> ดูไฟล์</a>` : '<span class="text-slate-300">-</span>';
                
                let actionHtml = '<span class="text-slate-300 text-xs">ดูได้อย่างเดียว</span>';
                if (currentUser.role === 'God_Admin' || currentUser.role === `Admin_${currentModule}`) {
                    actionHtml = `
                        <div class="flex justify-center gap-2">
                            <button onclick='editTx(${JSON.stringify(r)})' class="w-8 h-8 rounded-full bg-amber-50 text-amber-500 hover:bg-amber-100 hover:text-amber-600 transition flex items-center justify-center"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteTx('${r.id}')" class="w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-600 transition flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `;
                }

                tb.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-50 last:border-0">
                        <td class="p-3 md:p-4 whitespace-nowrap">${r.date}</td>
                        <td class="p-3 md:p-4 whitespace-nowrap"><span class="px-2.5 py-1 text-xs font-medium rounded-full ${r.type==='รายรับ'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${r.type}</span></td>
                        <td class="p-3 md:p-4 min-w-[150px]"><p class="font-medium text-slate-800">${r.item}</p><p class="text-xs text-slate-500 mt-0.5">${r.method !== '-' ? r.method : ''} ${r.note ? `(${r.note})` : ''}</p></td>
                        <td class="p-3 md:p-4 text-right font-semibold ${r.type==='รายรับ'?'text-green-600':'text-red-600'}">฿${Number(r.amount).toLocaleString('th-TH')}</td>
                        <td class="p-3 md:p-4 text-center whitespace-nowrap">${eviHtml}</td>
                        <td class="p-3 md:p-4 text-center">${actionHtml}</td>
                    </tr>`;
            });

            document.getElementById('c_income').innerText = `฿${inc.toLocaleString('th-TH')}`;
            document.getElementById('c_expense').innerText = `฿${exp.toLocaleString('th-TH')}`;
            document.getElementById('c_profit').innerText = `฿${(inc - exp).toLocaleString('th-TH')}`;
            document.getElementById('c_cash').innerText = `฿${(inc - exp).toLocaleString('th-TH')}`;
        }

        // --- Form & Upload ---
        function toggleEvi() {
            if(document.getElementById('f_eviType').value === 'file') {
                document.getElementById('f_file').classList.remove('hidden'); document.getElementById('f_link').classList.add('hidden');
            } else {
                document.getElementById('f_file').classList.add('hidden'); document.getElementById('f_link').classList.remove('hidden');
            }
        }

        function getBase64(file) {
            return new Promise((res, rej) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => res(reader.result.replace(/^data:(.*,)?/, ''));
                reader.onerror = e => rej(e);
            });
        }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave'); btn.innerText = 'กำลังบันทึก...'; btn.disabled = true;

            let payload = {
                module: currentModule, username: currentUser.username, rowIndex: document.getElementById('f_id').value,
                date: document.getElementById('f_date').value, type: document.getElementById('f_type').value,
                item: document.getElementById('f_item').value, method: document.getElementById('f_method').value,
                amount: document.getElementById('f_amount').value, note: document.getElementById('f_note').value
            };

            if(document.getElementById('f_eviType').value === 'file') {
                const f = document.getElementById('f_file').files[0];
                if(f) {
                    if(f.size > 5242880) { Swal.fire('ผิดพลาด', 'ไฟล์ขนาดเกิน 5MB', 'warning'); btn.innerText = 'บันทึกข้อมูล'; btn.disabled = false; return; }
                    payload.fileBase64 = await getBase64(f); payload.fileName = f.name; payload.fileMimeType = f.type;
                }
            } else payload.evidenceLink = document.getElementById('f_link').value;

            try {
                const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'save_tx', payload }) })).json();
                if (res.status === 'success') { Swal.fire({title: 'สำเร็จ', text: res.message, icon: 'success', timer: 1500, showConfirmButton: false}); closeModal(); fetchData(); }
                else Swal.fire('ผิดพลาด', res.message, 'error');
            } catch (err) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อได้', 'error'); }
            finally { btn.innerText = 'บันทึกข้อมูล'; btn.disabled = false; }
        }

        function editTx(r) {
            document.getElementById('modalTitle').innerText = 'แก้ไขรายการ';
            document.getElementById('f_id').value = r.id; document.getElementById('f_date').value = r.date;
            document.getElementById('f_type').value = r.type; document.getElementById('f_item').value = r.item;
            document.getElementById('f_method').value = r.method; document.getElementById('f_amount').value = r.amount;
            document.getElementById('f_note').value = r.note; openModal();
        }

        function deleteTx(id) {
            Swal.fire({ title: 'ยืนยันการลบ?', text: "ข้อมูลที่ลบจะไม่สามารถกู้คืนได้", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#94a3b8', confirmButtonText: 'ใช่, ลบเลย', cancelButtonText: 'ยกเลิก' })
            .then(async (result) => {
                if (result.isConfirmed) {
                    const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete_tx', payload: { module: currentModule, rowIndex: id } }) })).json();
                    if(res.status === 'success') { Swal.fire({title: 'ลบแล้ว!', icon: 'success', timer: 1500, showConfirmButton: false}); fetchData(); } 
                    else Swal.fire('ผิดพลาด', res.message, 'error');
                }
            });
        }

        function openModal() { document.getElementById('txModal').classList.remove('hidden'); document.body.classList.add('overflow-hidden'); }
        function closeModal() { document.getElementById('txModal').classList.add('hidden'); document.body.classList.remove('overflow-hidden'); document.getElementById('txForm').reset(); document.getElementById('f_id').value = ''; document.getElementById('modalTitle').innerText = 'บันทึกรายการใหม่'; document.getElementById('f_eviType').value = 'file'; toggleEvi(); }
        function logout() { sessionStorage.removeItem('user'); window.location.href = 'index.html'; }

        // Start App
        switchModule('Fund');
    </script>
</body>
</html>
